<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tom's Font Vault</title>

<style>
  :root {
    --bg: #111;
    --card: #1c1c1c;
    --text: #f2f2f2;
    --muted: #aaa;
    --accent: #00aaff;
    --border: #333;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 16px;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  h1 {
    margin: 0 0 8px;
    font-size: 28px;
  }

  .controls {
    display: grid;
    gap: 8px;
  }

  input, select, button {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #222;
    color: var(--text);
    font-size: 16px;
  }

  button {
    background: var(--accent);
    color: #000;
    font-weight: bold;
    cursor: pointer;
  }

  .meta {
    color: var(--muted);
    font-size: 14px;
    margin-top: 8px;
  }

  #fontGrid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    margin-top: 16px;
  }

  .font-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    overflow: hidden;
  }

  .font-name {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 10px;
    word-break: break-all;
  }

  .preview {
    font-size: 36px;
    line-height: 1.25;
    word-break: break-word;
  }

  .download {
    display: inline-block;
    margin-top: 12px;
    color: var(--accent);
    text-decoration: none;
    font-size: 14px;
  }

  .error {
    background: #3b1111;
    border: 1px solid #a33;
    padding: 12px;
    border-radius: 8px;
    margin-top: 12px;
  }

  @media (min-width: 800px) {
    #fontGrid {
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    }

    .controls {
      grid-template-columns: 1fr 1fr 140px;
    }
  }
</style>
</head>

<body>
<header>
  <h1>Tom's Font Vault</h1>

  <div class="controls">
    <input id="previewInput" value="HELLO TOM — The Quick Brown Fox 123" />
    <input id="searchInput" placeholder="Search font names..." />
    <select id="sizeSelect">
      <option value="24">24px</option>
      <option value="36" selected>36px</option>
      <option value="48">48px</option>
      <option value="64">64px</option>
      <option value="82">82px</option>
    </select>
  </div>

  <div class="meta" id="status">Loading fonts...</div>
</header>

<main id="fontGrid"></main>

<script>
/*
  SETUP:
  1. Put this file at:
     /fonts/index.html

  2. Put your font files in the same /fonts/ folder.

  3. Change these if your repo/user/folder is different.
*/
const GITHUB_USER = "tprivitor";
const REPO_NAME = "Fonts";
const FONT_FOLDER = "fonts"; // folder inside the repo containing this file + font files
const BRANCH = "main";

const API_URL = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FONT_FOLDER}?ref=${BRANCH}`;
const RAW_BASE = `https://${GITHUB_USER}.github.io/${REPO_NAME}/${FONT_FOLDER}/`;

const fontGrid = document.getElementById("fontGrid");
const statusEl = document.getElementById("status");
const previewInput = document.getElementById("previewInput");
const searchInput = document.getElementById("searchInput");
const sizeSelect = document.getElementById("sizeSelect");

let allFonts = [];

function isFontFile(name) {
  return /\.(ttf|otf|woff|woff2)$/i.test(name);
}

function safeFontFamily(filename, index) {
  return "font_" + index + "_" + filename.replace(/[^a-z0-9]/gi, "_");
}

function cleanName(filename) {
  return filename.replace(/\.(ttf|otf|woff|woff2)$/i, "");
}

async function loadFonts() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`GitHub API error ${res.status}`);

    const files = await res.json();

    allFonts = files
      .filter(file => file.type === "file" && isFontFile(file.name))
      .map((file, index) => ({
        name: file.name,
        displayName: cleanName(file.name),
        url: RAW_BASE + encodeURIComponent(file.name),
        family: safeFontFamily(file.name, index)
      }));

    renderFonts();
  } catch (err) {
    statusEl.innerHTML = `<span class="error">Could not load fonts. Check repo name, folder name, branch, or GitHub Pages path.<br>${err.message}</span>`;
  }
}

function injectFontFace(font) {
  const style = document.createElement("style");
  style.textContent = `
    @font-face {
      font-family: "${font.family}";
      src: url("${font.url}");
      font-display: swap;
    }
  `;
  document.head.appendChild(style);
}

function renderFonts() {
  const search = searchInput.value.toLowerCase();
  const previewText = previewInput.value || "HELLO TOM";
  const size = sizeSelect.value;

  fontGrid.innerHTML = "";

  const filtered = allFonts.filter(font =>
    font.name.toLowerCase().includes(search)
  );

  filtered.forEach(font => {
    if (!font.loaded) {
      injectFontFace(font);
      font.loaded = true;
    }

    const card = document.createElement("section");
    card.className = "font-card";

    card.innerHTML = `
      <div class="font-name">${font.name}</div>
      <div class="preview" style="font-family: '${font.family}', serif; font-size: ${size}px;">
        ${escapeHtml(previewText)}
      </div>
      <a class="download" href="${font.url}" target="_blank" rel="noopener">Open / download font</a>
    `;

    fontGrid.appendChild(card);
  });

  statusEl.textContent = `${filtered.length} of ${allFonts.length} fonts shown`;
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, char => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#039;"
  }[char]));
}

previewInput.addEventListener("input", renderFonts);
searchInput.addEventListener("input", renderFonts);
sizeSelect.addEventListener("change", renderFonts);

loadFonts();
</script>
</body>
</html>
