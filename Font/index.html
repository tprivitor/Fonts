<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tom's Font Vault</title>

<style>

@font-face {
    font-family: EagleLake;
    src: url("EagleLake.ttf");
}

@font-face {
    font-family: Diablo;
    src: url("DiabloLight.ttf");
}

@font-face {
    font-family: LastNinja;
    src: url("LastNinja.ttf");
}

body {
    font-family: Arial, sans-serif;
    padding: 20px;
}

.font-card {
    border: 1px solid #ccc;
    padding: 15px;
    margin-bottom: 15px;
}

.preview {
    font-size: 36px;
    margin-top: 10px;
}

</style>
</head>

<body>

<h1>Tom's Font Vault</h1>

<div class="font-card">
    <h2>EagleLake.ttf</h2>
    <div class="preview" style="font-family:EagleLake;">
        The Quick Brown Fox 123
    </div>
</div>

<div class="font-card">
    <h2>DiabloLight.ttf</h2>
    <div class="preview" style="font-family:Diablo;">
        The Quick Brown Fox 123
    </div>
</div>

<div class="font-card">
    <h2>LastNinja.ttf</h2>
    <div class="preview" style="font-family:LastNinja;">
        The Quick Brown Fox 123
    </div>
</div>

</body>
</html>
